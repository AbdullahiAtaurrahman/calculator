<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>

<body>
    <header>
        <div class="loogo">Cal-C</div>
        <div class="details">
            <span>Usage</span>
            <span>Author</span>
        </div>
    </header>
    <div class="container">
        <input type="text" class="input-field">
        <div class="top-div">
            <span class="logo-text">GOTW</span>
            <span class="key-buttons">
                <button class="number clear">AC</button>
                <button class="number clear">DEL</button>
            </span>
        </div>
        <div class="buttons">
            <div class="btn-rows">
                <button class="7 number">7</button>
                <button class="8 number">8</button>
                <button class="9 number">9</button>
                <button class="division number">/</button>
            </div>
            <div class="btn-rows">
                <button class="4 number">4</button>
                <button class="5 number">5</button>
                <button class="6 number">6</button>
                <button class="multiply number">*</button>
            </div>
            <div class="btn-rows">
                <button class="1 number">1</button>
                <button class="2 number">2</button>
                <button class="3 number">3</button>
                <button class="subtract number">-</button>
            </div>
            <div class="btn-rows">
                <button class="dot number">.</button>
                <button class="0 number">0</button>
                <button class="equal number">=</button>
                <button class="add number">+</button>
            </div>
        </div>
    </div>
    <footer>
        &copy;GOTW 2025
    </footer>

    <script src="./script.js"></script>
</body>

</html>
